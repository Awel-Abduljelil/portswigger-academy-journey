name: Update PortSwigger Lab Tracker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate tracker table
        run: python scripts/update_lab_tracker.py

      - name: Commit updated tracker
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update solved labs tracker"
          file_pattern: "tracker/labs-tracker.md"
